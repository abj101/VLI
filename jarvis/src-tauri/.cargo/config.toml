# Keep Cargo environment cross-platform.
# CMake should come from the active shell PATH (Homebrew on macOS, package install on Windows/Linux).
#
# If a local setup needs a custom executable path, set CMAKE in the shell/user profile:
#   PowerShell: $env:CMAKE = "C:\path\to\cmake.exe"
#   bash/zsh:   export CMAKE=/path/to/cmake
[env]
CMAKE = { value = "cmake", force = false }
